<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRUD Clientes</title>
<link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <div id="container">
        <h1>Gestión de Clientes</h1>
        <section id="uno">
            <h2>Crear Cliente</h2>
            <input id="crearRut" placeholder="Rut">
            <input id="crearNombre" placeholder="Nombre">
            <input id="crearEdad" placeholder="Edad" type="number">
            <button id="btnCrear">Crear</button>
            <p class="error" id="errorCrear"></p>
        </section>

        <section id="dos">
            <h2>Modificar Cliente</h2>
            <input id="modRut" placeholder="Rut">
            <input id="modNombre" placeholder="Nuevo Nombre">
            <button id="btnModificar">Modificar</button>
            <p class="error" id="errorModificar"></p>
        </section>

        <section id="tres">
            <h2>Eliminar Cliente</h2>
            <input id="delRut" placeholder="Rut">
            <button id="btnEliminar">Eliminar</button>
            <p class="error" id="errorEliminar"></p>
        </section>

        <section>
            <h2>Clientes Registrados</h2>
            <button id="btnListar">Listar Todos</button>
            <button id="btnCerrarLista" style="display:none;">X</button>
            <ul id="listaClientes"></ul>
        </section>
    </div>
    <footer>Proyecto con fines Educativos para el curso de Full Stack de Sence 2025-2026 </footer>

<script src="/js/app.js"></script>
</body>
</html>
